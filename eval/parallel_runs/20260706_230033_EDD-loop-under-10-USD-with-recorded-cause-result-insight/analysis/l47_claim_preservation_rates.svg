<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" role="img" aria-labelledby="title desc">
  <title id="title">L47 Claim Preservation Rates</title>
  <desc id="desc">Claim preservation rates for L37, L40, and L44 diagnostic qv6_007 checks.</desc>
  <style>
    .axis { stroke: #2f3640; stroke-width: 1.2; }
    .grid { stroke: #d8dee9; stroke-width: 1; }
    .label { fill: #2f3640; font-family: Arial, sans-serif; font-size: 13px; }
    .title { fill: #1f2933; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
    .bar-a { fill: #d95757; }
    .bar-b { fill: #e6a23c; }
    .bar-c { fill: #e6a23c; }
    .note { fill: #52616b; font-family: Arial, sans-serif; font-size: 12px; }
  </style>
  <rect x="0" y="0" width="760" height="320" fill="#ffffff"/>
  <text class="title" x="42" y="34">L47 Claim Preservation Diagnostic</text>
  <text class="note" x="42" y="56">Diagnostic-only exposed qv6_007. Rate = preserved claims / expected source-supported claims.</text>
  <line class="grid" x1="90" y1="240" x2="710" y2="240"/>
  <line class="grid" x1="90" y1="160" x2="710" y2="160"/>
  <line class="grid" x1="90" y1="80" x2="710" y2="80"/>
  <line class="axis" x1="90" y1="240" x2="710" y2="240"/>
  <line class="axis" x1="90" y1="80" x2="90" y2="240"/>
  <text class="label" x="50" y="244">0.0</text>
  <text class="label" x="50" y="164">0.5</text>
  <text class="label" x="50" y="84">1.0</text>
  <rect class="bar-a" x="150" y="240" width="110" height="0"/>
  <rect class="bar-b" x="325" y="160" width="110" height="80"/>
  <rect class="bar-c" x="500" y="160" width="110" height="80"/>
  <text class="label" x="179" y="260">L37</text>
  <text class="label" x="354" y="260">L40</text>
  <text class="label" x="529" y="260">L44</text>
  <text class="label" x="177" y="232">0.0</text>
  <text class="label" x="352" y="152">0.5</text>
  <text class="label" x="527" y="152">0.5</text>
  <text class="note" x="130" y="288">L37: both claims missed</text>
  <text class="note" x="310" y="288">L40/L44: unmanned recovered, physical access-control still failed</text>
</svg>
