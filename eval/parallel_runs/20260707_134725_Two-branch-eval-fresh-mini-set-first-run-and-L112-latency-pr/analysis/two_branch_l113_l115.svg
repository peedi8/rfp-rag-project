<svg xmlns="http://www.w3.org/2000/svg" width="920" height="390" viewBox="0 0 920 390" role="img" aria-label="Two branch diagnostic result chart">
  <rect width="920" height="390" fill="#ffffff"/>
  <text x="32" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">L113-L115 Two-Branch Results</text>
  <text x="32" y="58" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Branch B: same-cohort latency only. Branch A: source-inspected diagnostic first execution plus measurement correction.</text>
  <text x="70" y="92" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Branch B latency avg (lower is better)</text>
  <line x1="70" y1="260" x2="500" y2="260" stroke="#d1d5db"/>
  <g font-family="Arial, sans-serif" font-size="12" fill="#374151">
    <rect x="95" y="164" width="55" height="96" fill="#2563eb"/>
    <text x="91" y="280">L112</text>
    <text x="92" y="154">7.18s</text>
    <rect x="190" y="145" width="55" height="115" fill="#64748b"/>
    <text x="187" y="280">top5</text>
    <text x="187" y="135">8.60s</text>
    <rect x="285" y="148" width="55" height="112" fill="#64748b"/>
    <text x="282" y="280">top8</text>
    <text x="282" y="138">8.37s</text>
    <rect x="380" y="61" width="55" height="199" fill="#dc2626"/>
    <text x="374" y="280">top12</text>
    <text x="374" y="51">14.89s</text>
  </g>
  <text x="560" y="92" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Branch A v9 diagnostic</text>
  <line x1="560" y1="260" x2="850" y2="260" stroke="#d1d5db"/>
  <g font-family="Arial, sans-serif" font-size="12" fill="#374151">
    <rect x="595" y="73" width="65" height="187" fill="#f59e0b"/>
    <text x="590" y="280">L114 raw</text>
    <text x="587" y="63">EDD 93.42</text>
    <text x="586" y="302">abst 0.5</text>
    <rect x="735" y="61" width="65" height="199" fill="#16a34a"/>
    <text x="724" y="280">L115 recompute</text>
    <text x="727" y="51">EDD 98.42</text>
    <text x="733" y="302">abst 1.0</text>
  </g>
  <text x="70" y="340" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Decision: keep L112/top8 baseline for same-cohort latency. Record v9 as source-inspected diagnostic, not strict held-out validation.</text>
</svg>
